      volume={}
    }
  abstract: We study the K-stability of ℚ-Fano spherical varieties using compatible divisors. More precisely, if the ℚ-Fano variety, with a reductive group action, has an open Borel subgroup orbit, then there is a unique anticanonical ℚ-divisor computing the equivariant stability threshold. This ℚ-divisor is invariant under the Borel subgroup action, and it characterizes the K-stability of a ℚ-Fano spherical variety.

